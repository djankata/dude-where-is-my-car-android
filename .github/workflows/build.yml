name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Copy icon
        run: mkdir -p app/src/main/res/mipmap-xxxhdpi && cp icon-512.png app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Set up Gradle wrapper
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Generate signing key
        run: keytool -genkeypair -v -keystore keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias dwimc -storepass android123 -keypass android123 -dname "CN=DWIMC, OU=App, O=djankata, L=Sofia, C=BG"

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build release APK
        run: ./gradlew assembleRelease -Pandroid.injected.signing.store.file=${{ github.workspace }}/keystore.jks -Pandroid.injected.signing.store.password=android123 -Pandroid.injected.signing.key.alias=dwimc -Pandroid.injected.signing.key.password=android123 --no-daemon

      - name: Build release AAB
        run: ./gradlew bundleRelease -Pandroid.injected.signing.store.file=${{ github.workspace }}/keystore.jks -Pandroid.injected.signing.store.password=android123 -Pandroid.injected.signing.key.alias=dwimc -Pandroid.injected.signing.key.password=android123 --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: app/build/outputs/bundle/release/app-release.aab

      - name: Upload Keystore
        uses: actions/upload-artifact@v4
        with:
          name: signing-keystore
          path: keystore.jks
